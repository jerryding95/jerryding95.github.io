<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Academic Site</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script defer src="assets/js/script.js"></script>
</head>
<body>
        <header class="head">
        <img src="me.png" alt="photo of Jianru Ding" id="profile-pic" />
        <h1>Jianru (Jerry) Ding</h1>
        <p>Computer scientist researching systems and distributed computing.</p>
    </header>

    <div class="wrap">
        <section id="intro">
            <h2>About</h2>
            <p>Hi, I&rsquo;m <strong>Jianru (Jerry) Ding</strong>. This site showcases my
            projects and publications, all rendered client-side for a fast,
            interactive experience.</p>
        </section>

        <section id="projects">
            <h2>Projects</h2>
            <input id="project-search" type="text" placeholder="Search projects...">
            <ul id="project-list">
                <!-- populated by script -->
            </ul>
        </section>

        <section id="publications">
            <h2>Publications</h2>
            <input id="pub-search" type="text" placeholder="Filter publications...">
            <ul id="pub-list">
                <!-- populated by script -->
            </ul>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Jianru (Jerry) Ding</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jianru (Jerry) Ding</title>
  <meta name="description" content="Jianru (Jerry) Ding — systems and distributed computing researcher." />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="preload" as="image" href="headshot.jpg" />
  <style>
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    .head {
      text-align: center;
    }

    .head img {
      width: 140px;
      height: 140px;
      border-radius: 8px;
      object-fit: cover;
      display: block;
      margin: 0 auto 20px;
      transition: filter 220ms ease, opacity 220ms ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      background-color: #f5f5f5;
      background-image: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
    }

    .head img.blur {
      filter: blur(10px);
      opacity: 0.8;
    }

    .head img.loaded {
      filter: none;
      opacity: 1;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 30px;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .tag {
      margin: 0 0 16px 0;
      color: #555;
      font-weight: 400;
      line-height: 1.4;
    }
    .tag-item {
      display: inline-block;
      margin: 0 1.5em;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .links a {
      margin: 0;
      color: #111;
      text-decoration: none;
      transition: all 200ms ease;
      display: inline-flex;
      align-items: center;
      line-height: 1.2;
      font-weight: 400;
      padding: 4px 0;
    }

    .links a:hover {
      color: #333;
      transform: translateY(-1px);
      text-decoration: underline;
    }

    .links a.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .links a:focus-visible {
      outline: 2px solid #111;
      outline-offset: 2px;
      border-radius: 4px;
    }

    .terminal {
      display: block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: #0f1117;
      color: #e6e7eb;
      border: 1px solid #1f2330;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
      max-height: 360px;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      hyphens: auto;
    }
    .terminal strong,
    .terminal .bold {
      font-weight: bold;
    }

    .terminal a {
      color: #8ab4f8;
      text-decoration: underline;
    }

    .terminal a:hover {
      color: #cde3ff;
    }

    .terminal[hidden] {
      display: none;
    }

    .prompt {
      color: #6cff6c;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="head">
      <img src="headshot.jpg" alt="Jianru (Jerry) Ding" loading="eager" decoding="async" class="blur" />
      <h1>Jianru (Jerry) Ding</h1>
      <p class="tag">PhD Candidate <em>at</em> University of Chicago<br>Research Intern <em>at</em> Azure Research - Systems, Microsoft<br>Systems; Distributed Computing; LLM Post-Training and Serving</p>
      <p class="links">
        <a href="#about" data-target="about">About</a>
        <a href="#projects" data-target="projects">Projects</a>
        <a href="#publications" data-target="publications">Publications</a>
        <a href="CV.pdf" id="link-cv" target="_blank">CV↗</a>
        <a href="https://scholar.google.com/citations?user=sF_1enIAAAAJ&hl=en" id="link-scholar" target="_blank">Scholar↗</a>
        <a href="mailto:jrding@uchicago.edu" id="link-email">Email</a>
      </p>
    </div>
    <div class="body">
      <div id="terminal" class="terminal" aria-live="polite" hidden></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bibtex-parser-js@0.0.2/bibtexParse.min.js"></script>
  <script>
    (function () {
      // Image loading and tagline
      var hero = document.querySelector('.head img');
      var tagEl = document.querySelector('.tag');

      if (hero && hero.complete) hero.classList.add('loaded'), hero.classList.remove('blur');
      else if (hero) hero.onload = () => (hero.classList.add('loaded'), hero.classList.remove('blur'));
      if (tagEl) tagEl.innerHTML = 'PhD Candidate <em>at</em> University of Chicago<br>Research Intern <em>at</em> Azure Research - Systems, Microsoft<br>Systems; Distributed Computing; LLM Post-Training and Serving';
      var terminal = document.getElementById('terminal');
      var navLinks = document.querySelectorAll('.links a[data-target]');
      var allTopLinks = document.querySelectorAll('.links a');
      var isTyping = false;
      var typingTimeout = null;
      var typingToken = 0; // increments to cancel in-flight typing

      var contentMap = {
        about: [
          '> about',
          '',
          'Hi, I’m Jianru (Jerry) Ding, a systems and distributed computing researcher.',
          'This site is a simple interactive CV.'
        ],
        projects: [
          '> open projects',
          '',
          '— LLM-agent serving on heterogeneous GPUs',
          '— Software-Defined Cooling for datacenters',
          '— UpDown graph analytics system',
        ],
        publications: [
          '> open publications',
          '',
          'Example Paper 1 (2024)',
          'Example Paper 2 (2023)',
          'Example Paper 3 (2022)',
        ],
        email: ['Email: jrding95@gmail.com']
      };

      var typingId = 0;
      function showTerminalContent(key) {
        typingId++;
        var myId = typingId;
        terminal.innerHTML = '';
        terminal.hidden = false;
        
        function typeLines(lines) {
          var lineIndex = 0;
          function typeLine(line, pos, done) {
            if (myId !== typingId) return; // cancelled
            if (pos < line.length) {
              // if an HTML tag starts here, append whole tag at once
              if (line.charAt(pos) === '<') {
                var end = line.indexOf('>', pos);
                if (end !== -1) {
                  terminal.innerHTML += line.slice(pos, end + 1);
                  pos = end + 1;
                  setTimeout(() => typeLine(line, pos, done), 10);
                  return;
                }
              }
              terminal.innerHTML += line.charAt(pos);
              setTimeout(() => typeLine(line, pos + 1, done), 10);
            } else {
              terminal.innerHTML += '\n';
              done();
            }
          }
          function typeNext() {
            if (myId !== typingId) return;
            if (lineIndex < lines.length) {
              typeLine(lines[lineIndex], 0, () => {
                lineIndex++;
                typeNext();
              });
            }
          }
          typeNext();
        }
        
        if (key === 'publications') {
          // fetch the bibliography file relative to the current document
          var bibPath = './publications.bib';
          console.log('fetching bibliography at', bibPath);
          fetch(bibPath)
            .then(r => {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.text();
            })
            .then(text => {
              console.log('bib text length', text.length);
              console.log('bib text preview', text.slice(0,200));
              var parsed = bibtexParse.toJSON(text);
              console.log('parsed entries', parsed.length, parsed);
              var lines = ['> open publications', ''];
              if (parsed.length === 0) lines.push('[no entries found]');
              parsed.forEach(e => {
                var f = e.entryTags || {};
                // normalize keys to lowercase for easier access
                var nf = {};
                Object.keys(f).forEach(k => { nf[k.toLowerCase()] = f[k]; });
                var authors = nf.author ? nf.author.replace(/ and /g, ', ') : '';
                var title = nf.title ? nf.title.replace(/[{}]/g, '') : '';
                var year = nf.year || '';
                var venue = nf.booktitle || nf.journal || '';
                var url = nf.url || nf.link || '';
                var line = '- ';
                if (authors) line += authors + ', ';
                if (title) line += '"' + title + '"';
                if (venue) line += ', ' + venue;
                if (year) line += ', ' + year;
                if (url) line += ' (' + url + ')';
                if (nf.note) line += ', ' + nf.note;
                // convert LaTeX bold to HTML bold span
                line = line.replace(/\\textbf\{([^}]+)\}/g, '<span class="bold">$1</span>');
                lines.push(line);
                // add an empty line for readability
                lines.push('');
              });
              typeLines(lines);
            })
            .catch(err => {
              console.error('bib fetch failed', err);
              typeLines(['Error loading publications']);
              typeLines(['> ' + err.message]);
            });
          return;
        }
        
        var lines = contentMap[key] || [''];
        typeLines(lines);
      }

      navLinks.forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          var target = a.getAttribute('data-target');
          showTerminalContent(target);
        });
      });

      // open-external markers
      function markLink(el) {
        if (!el.dataset.marked) {
          el.textContent += ' ✓';
          el.dataset.marked = '1';
        }
      }
      var linkCv = document.getElementById('link-cv');
      var linkScholar = document.getElementById('link-scholar');
      var linkEmail = document.getElementById('link-email');
      if (linkCv) linkCv.addEventListener('click', () => markLink(linkCv));
      if (linkScholar) linkScholar.addEventListener('click', () => markLink(linkScholar));
      if (linkEmail) linkEmail.addEventListener('click', () => markLink(linkEmail));

      // optionally show default (none)
      // showTerminalContent('projects');
    })();
  </script>
</body>
</html>
